<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Icebyflexy — Earrings Collection (mobile optimized)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes"/>
  <meta name="description" content="Premium earrings collection – studs, hoops, drops. Fully responsive mobile shopping."/>
  <!-- Fonts & Icons (kept same, good performance) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
  <style>
    /* RESET & GLOBAL – light mode, clean, mobile-first */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #ffffff;
      color: #2d2d2d;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.45;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; height: auto; }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(212, 175, 55, 0.15);
      z-index: 1100;
    }
    .progress-bar-line {
      height: 100%;
      width: 0;
      background: #d4af37;
      transition: width 0.1s linear;
    }

    /* Navbar – always slightly translucent for readability */
    .transparent-navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 0.75rem 0;
      z-index: 1050;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      transition: all 0.2s;
    }
    .navbar-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .site-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      letter-spacing: 1.5px;
      font-size: 1.2rem;
      color: #1a1a1a;
      display: flex;
      align-items: center;
    }
    .site-logo img {
      height: 1cm;           /* ~0.79in – keeps original intention */
      width: auto;
      border-radius: 50%;
      max-height: 38px;       /* prevents overflow on tiny screens */
    }
    .nav-links {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .nav-link {
      font-weight: 600;
      font-size: 0.85rem;    /* slightly smaller for mobile, still readable */
      text-transform: uppercase;
      color: #555;
      white-space: nowrap;
    }
    .nav-link.active, .nav-link:hover {
      color: #b8860b; /* deeper gold */
    }

    /* Hero – compress height for mobile, avoid overflow */
    .hero {
      min-height: 32vh;        /* smaller on mobile */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem 1rem 2rem; /* top padding accounts for fixed navbar */
      background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                  url('https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?ixlib=rb-4.0.3&auto=format&fit=crop&w=1480&q=80') center/cover no-repeat;
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 8vw, 2.8rem);
      color: #1a1a1a;
    }
    .hero p {
      color: #444;
      font-size: 1rem;
      margin-top: 0.5rem;
      padding: 0 0.5rem;
    }

    /* Controls – vertical stacking on mobile, clean */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin: 1.5rem 0 1.5rem;
    }
    .search {
      flex: 2 1 200px;
      min-width: 160px;
      display: flex;
      align-items: center;
      background: #f8f8f8;
      padding: 0.2rem 0.5rem;
      border-radius: 40px;
      border: 1px solid #eee;
      transition: 0.2s;
    }
    .search:focus-within {
      border-color: #d4af37;
      background: #fff;
      box-shadow: 0 0 0 2px rgba(212,175,55,0.2);
    }
    .search input {
      background: transparent;
      border: 0;
      outline: none;
      color: #333;
      padding: 0.6rem 0.3rem;
      font-size: 0.95rem;
      width: 100%;
    }
    .search input::placeholder { color: #aaa; }

    .select {
      background: #f8f8f8;
      padding: 0.6rem 0.8rem;
      border-radius: 40px;
      border: 1px solid #eee;
      color: #333;
      font-size: 0.9rem;
      cursor: pointer;
      flex: 1 1 auto;
      min-width: 130px;
    }

    .badge {
      background: #1a1a1a;
      color: white;
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    /* Grid – single column on <480, 2 cols on tablet, 4 on desktop */
    .grid {
      display: grid;
      grid-template-columns: 1fr;               /* mobile first */
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }
    @media (min-width: 500px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }

    .card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 18px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.04);
      border-color: #d4af37;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;          /* makes all images square */
      object-fit: cover;
      background: #fafafa;
    }

    .card-body {
      padding: 1rem 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
    }

    .product-title {
      font-weight: 700;
      color: #1a1a1a;
      font-size: 1rem;
      line-height: 1.3;
    }
    .product-meta {
      color: #777;
      font-size: 0.8rem;
      text-transform: capitalize;
    }
    .earrings-features {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.3rem 0;
    }
    .earrings-feature {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      background: #f2f2f2;
      border-radius: 30px;
      color: #555;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      padding-top: 0.3rem;
      border-top: 1px solid #f0f0f0;
    }
    .price {
      font-weight: 700;
      color: #b8860b;
      font-size: 1.1rem;
    }

    /* Buttons – larger touch targets */
    .btn {
      background: transparent;
      border: 1px solid #ccc;
      color: #333;
      padding: 0.55rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      touch-action: manipulation;
    }
    .btn.primary {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    .btn.primary:hover {
      background: #d4af37;
      border-color: #d4af37;
    }
    .btn.ghost {
      border-color: transparent;
    }

    /* Cart toggle – visible, safe bottom spacing */
    .cart-toggle {
      position: fixed;
      right: 1rem;
      bottom: 1.5rem;
      background: #1a1a1a;
      color: white;
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      z-index: 1200;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      display: flex;
      gap: 0.5rem;
      align-items: center;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      touch-action: manipulation;
    }

    /* Cart sidebar – full width on mobile */
    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      max-width: 400px;          /* but on small screens it's 100% */
      height: 100vh;
      background: #fff;
      box-shadow: -10px 0 30px rgba(0,0,0,0.1);
      padding: 1.5rem 1rem 1.5rem;
      transition: right 0.3s ease;
      z-index: 1190;
      display: flex;
      flex-direction: column;
      color: #333;
    }
    .cart-sidebar.open {
      right: 0;
    }
    @media (max-width: 480px) {
      .cart-sidebar { max-width: 100%; }
    }

    .cart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .cart-items {
      overflow-y: auto;
      flex: 1;
      padding-right: 0.25rem;
    }
    .cart-item {
      display: flex;
      gap: 0.8rem;
      padding: 1rem 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .cart-item img {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      background: #f5f5f5;
      object-fit: cover;
    }
    .muted { color: #777; font-size: 0.85rem; }

    /* Modal – mobile friendly, full width, no overflow */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1250;
    }
    .modal-backdrop.show { display: flex; }

    .modal {
      background: white;
      border-radius: 28px;
      padding: 1.2rem;
      width: 92%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      border: 1px solid #eee;
      color: #333;
      margin: 0 0.5rem;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr;  /* stack on mobile */
      gap: 1.2rem;
    }
    @media (min-width: 640px) {
      .modal-grid { grid-template-columns: 1fr 1fr; }
    }

    .modal img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 20px;
      background: #f8f8f8;
    }

    /* utilities */
    .empty {
      padding: 3rem 1rem;
      text-align: center;
      color: #888;
    }

    /* increased touch area for small buttons */
    button {
      touch-action: manipulation;
    }

    /* prevent horizontal scroll on body */
    body {
      overflow-x: hidden;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="progress-bar"><div class="progress-bar-line" id="progressBar"></div></div>

  <header class="transparent-navbar" id="navbar">
    <div class="container">
      <div class="navbar-wrapper">
        <a class="site-logo" href="index.html"><img src="logo.png" alt="Icebyflexy Logo" loading="lazy"></a>
        <nav class="nav-links">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="About.html">About</a>
          <a class="nav-link" href="shop.html">Shop</a>
          <a class="nav-link active" href="earrings.html">Earrings</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="earrings hero">
      <div>
        <h1>Earrings that whisper elegance</h1>
        <p>Discover our curated collection — from everyday studs to statement drops.</p>
      </div>
    </section>

    <section class="container" aria-label="earrings shop">
      <div class="controls">
        <div class="search" role="search">
          <span class="material-icons" style="opacity:0.7; font-size:1.2rem;">search</span>
          <input id="searchInput" placeholder="Search e.g. 'hoops', 'gold'" aria-label="Search earrings"/>
        </div>

        <select id="categorySelect" class="select" aria-label="Filter by category">
          <option value="all">All earrings</option>
          <option value="studs">Studs</option>
          <option value="hoops">Hoops</option>
          <option value="drops">Drop</option>
          <option value="statement">Statement</option>
          <option value="huggies">Huggies</option>
          <option value="gold">Gold</option>
          <option value="silver">Silver</option>
          <option value="pearl">Pearl</option>
          <option value="diamond">Diamond</option>
        </select>

        <select id="sortSelect" class="select" aria-label="Sort">
          <option value="featured">Featured</option>
          <option value="price-asc">Price: low to high</option>
          <option value="price-desc">Price: high to low</option>
          <option value="newest">Newest</option>
        </select>

        <div class="badge" id="resultsCount">0</div>
      </div>

      <div id="productsGrid" class="grid" aria-live="polite" aria-label="Earrings grid"></div>
      <div id="emptyState" class="empty" style="display:none" role="status">No earrings found — try adjusting filters.</div>
    </section>
  </main>

  <!-- Cart toggle (mobile friendly) -->
  <button id="cartToggle" class="cart-toggle" aria-haspopup="dialog" aria-label="Open shopping cart">
    <span class="material-icons-outlined">shopping_cart</span>
    <span id="cartCount">0</span>
  </button>

  <!-- Cart sidebar -->
  <aside id="cartSidebar" class="cart-sidebar" aria-hidden="true" aria-label="Shopping cart">
    <div class="cart-head">
      <div style="font-weight:700; font-size:1.2rem;">Your Cart</div>
      <button id="closeCart" class="btn ghost" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div style="display:flex; justify-content:space-between; margin:1rem 0 0.5rem;">
        <span class="muted">Subtotal</span>
        <span id="cartSubtotal" style="font-weight:700; color:#b8860b;">$0.00</span>
      </div>
      <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
        <button id="checkoutBtn" class="btn primary" style="flex:1 1 120px;">Checkout</button>
        <button id="clearCartBtn" class="btn" style="flex:1 1 80px;">Clear</button>
      </div>
    </div>
  </aside>

  <!-- Modal -->
  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-label="Earrings details">
    <div class="modal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
        <div style="font-weight:700; font-size:1.2rem;" id="modalTitle">Earrings</div>
        <button id="closeModal" class="btn ghost" aria-label="Close modal">✕</button>
      </div>
      <div class="modal-grid">
        <div><img id="modalImage" src="" alt=""/></div>
        <div style="display:flex; flex-direction:column; gap:0.8rem;">
          <div id="modalPrice" style="font-weight:800; color:#b8860b; font-size:1.4rem;"></div>
          <div id="modalDescription" class="muted"></div>
          <div class="earrings-features" id="modalFeatures"></div>
          <div style="display:flex; gap:0.8rem; align-items:center; flex-wrap:wrap; margin-top:0.8rem;">
            <input id="modalQty" type="number" min="1" value="1" aria-label="Quantity" style="width:70px; padding:0.6rem; border-radius:40px; border:1px solid #ccc; background:white; color:#333; font-size:1rem;">
            <button id="modalAddBtn" class="btn primary" style="flex:1; min-width:120px;">Add to cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- PRODUCT DATA (kept identical with corrected image paths if needed) -----
      const products = [
        { id: 'e001', title:'Four-Leaf Clover Diamond Studs', price:2300, category:'studs', tags: ['diamond', 'gold'], img:'./IBFR (1).jpeg', desc:'diamond stud earrings feature a delicate four-petal flower .The center highlights four larger heart-cut diamonds that add extra romance and dimension, while the surrounding smaller diamonds create a dazzling halo effect that catches light from every angle.', features: ['14k Gold', 'Hypoallergenic', 'Everyday Wear', 'Screw Back'] },
        { id: 'e002', title:'Rose Gold Diamond Studs', price:2300, category:'studs', tags: ['diamond', 'rose gold'], img:'./IBFR (2).jpeg', desc:'sophisticated oval-shaped design in warm 18K (or 14K) rose gold, offering a soft, romantic pink hue that flatters all skin tones.', features: ['Freshwater Pearl', '14k Gold Chain', 'Elegant', 'Lightweight'] },
        { id: 'e003', title:'Diamond Geometric Studs', price:2000, category:'studs', tags: ['gold', 'silver'], img:'./IBFR (3).jpeg', desc:'a luxurious circular design in radiant white gold (likely 18K or 14K for that cool, brilliant finish), delivering timeless sophistication and serious sparkle.', features: ['Mixed Metal', 'Geometric Design', 'Medium Size', 'Secure Closure'] },
        { id: 'e004', title:'Diamond Heart Drop Earrings', price:2500, category:'drops', tags: ['diamond', 'gold'], img:'./IBFR (4).jpeg', desc:'small round stud top, fully encircled with tiny pavé diamonds and centered by a single sparkling round brilliant-cut diamond for secure, elegant attachment. From this drops a larger open-heart frame, completely pavé-set with round diamonds along the edges for maximum brilliance.', features: ['14k Gold', 'Diamond Accents', 'Romantic Design', 'Lightweight'] },
        { id: 'e005', title:'Statement Diamond Stud Earrings', price:2300, category:'statement', tags: ['silver'], img:'./IBFR (5).jpeg', desc:'fully bordered by a double halo of sparkling round brilliant-cut diamonds that create a shimmering outer edge and inner outline for added depth and fire. At the center, a striking arrangement of baguette-cut diamonds is meticulously set in parallel rows—three vertical columns of three baguettes each—forming a clean, architectural grid that dominates the face with sharp, linear brilliance.', features: ['Sterling Silver', 'Tassel Design', 'Statement Piece', 'Lightweight'] },
        { id: 'e006', title:'Timeless Rose Gold Earrings', price:2000, category:'hoops', tags: ['rose gold', 'silver'], img:'./IBFR (6).jpeg', desc:'delivering that soft, romantic pink glow that complements virtually every skin tone beautifully. The design is a classic, medium-sized hoop with a smooth, polished surface that reflects light with every movement, creating a subtle yet captivating shimmer.', features: ['14k Rose Gold', 'Medium Size', 'Everyday Wear', 'Hinged Closure'] },
      ];

      // ----- CART -----
      let cart = JSON.parse(localStorage.getItem('iceby_cart') || '{}');

      // DOM elements
      const productsGrid = document.getElementById('productsGrid');
      const resultsCount = document.getElementById('resultsCount');
      const emptyState = document.getElementById('emptyState');
      const searchInput = document.getElementById('searchInput');
      const categorySelect = document.getElementById('categorySelect');
      const sortSelect = document.getElementById('sortSelect');
      const cartToggle = document.getElementById('cartToggle');
      const cartSidebar = document.getElementById('cartSidebar');
      const cartItemsEl = document.getElementById('cartItems');
      const cartCount = document.getElementById('cartCount');
      const cartSubtotal = document.getElementById('cartSubtotal');
      const closeCart = document.getElementById('closeCart');
      const clearCartBtn = document.getElementById('clearCartBtn');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const modalBackdrop = document.getElementById('modalBackdrop');
      const modalTitle = document.getElementById('modalTitle');
      const modalImage = document.getElementById('modalImage');
      const modalPrice = document.getElementById('modalPrice');
      const modalDescription = document.getElementById('modalDescription');
      const modalFeatures = document.getElementById('modalFeatures');
      const modalQty = document.getElementById('modalQty');
      const modalAddBtn = document.getElementById('modalAddBtn');
      const closeModal = document.getElementById('closeModal');

      function formatPrice(n) { return '$' + n.toFixed(2); }
      function getProduct(id) { return products.find(p => p.id === id); }

      // Render products
      function renderProducts() {
        const q = (searchInput.value || '').trim().toLowerCase();
        const cat = categorySelect.value;
        const sort = sortSelect.value;

        let list = products.slice();

        if (cat !== 'all') {
          list = list.filter(p => p.category === cat || (p.tags && p.tags.includes(cat)));
        }

        if (q) {
          list = list.filter(p => (p.title + ' ' + p.desc + ' ' + p.category + ' ' + (p.tags || []).join(' ')).toLowerCase().includes(q));
        }

        if (sort === 'price-asc') list.sort((a,b)=>a.price - b.price);
        else if (sort === 'price-desc') list.sort((a,b)=>b.price - a.price);
        else if (sort === 'newest') list.reverse();

        productsGrid.innerHTML = '';
        if (!list.length) {
          emptyState.style.display = 'block';
        } else {
          emptyState.style.display = 'none';
          list.forEach(p => {
            const card = document.createElement('article');
            card.className = 'card';
            card.innerHTML = `
              <img class="card-img" loading="lazy" src="${p.img}" alt="${p.title}">
              <div class="card-body">
                <div class="product-title">${p.title}</div>
                <div class="product-meta">${p.category}</div>
                <div class="earrings-features">
                  ${p.features.slice(0,3).map(f => `<span class="earrings-feature">${f}</span>`).join('')}
                </div>
                <div class="price-row">
                  <span class="price">${formatPrice(p.price)}</span>
                  <div style="display:flex; gap:0.4rem;">
                    <button class="btn ghost" data-action="view" data-id="${p.id}" aria-label="View">View</button>
                    <button class="btn primary" data-action="add" data-id="${p.id}" aria-label="Add">Add</button>
                  </div>
                </div>
              </div>
            `;
            productsGrid.appendChild(card);
          });
        }
        resultsCount.textContent = list.length;
      }

      // Cart functions
      function saveCart() { localStorage.setItem('iceby_cart', JSON.stringify(cart)); }

      function renderCart() {
        cartItemsEl.innerHTML = '';
        const ids = Object.keys(cart);
        let subtotal = 0;
        if (!ids.length) {
          cartItemsEl.innerHTML = '<div class="muted">Your cart is empty.</div>';
        } else {
          ids.forEach(id => {
            const p = getProduct(id);
            const qty = cart[id];
            if (!p) return;
            subtotal += p.price * qty;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'cart-item';
            itemDiv.innerHTML = `
              <img src="${p.img}" alt="${p.title}">
              <div class="cart-item-info">
                <div style="font-weight:600">${p.title}</div>
                <div class="muted">${formatPrice(p.price)} × ${qty}</div>
                <div style="display:flex; gap:0.4rem; margin-top:0.5rem;">
                  <button class="btn" data-action="dec" data-id="${id}">−</button>
                  <button class="btn" data-action="inc" data-id="${id}">+</button>
                  <button class="btn" data-action="rem" data-id="${id}">Remove</button>
                </div>
              </div>
            `;
            cartItemsEl.appendChild(itemDiv);
          });
        }
        cartCount.textContent = ids.reduce((s,id) => s + cart[id], 0) || 0;
        cartSubtotal.textContent = formatPrice(subtotal);
      }

      function addToCart(id, qty=1) {
        cart[id] = (cart[id] || 0) + qty;
        saveCart(); renderCart();
      }
      function setCartQty(id, qty) {
        if (qty <= 0) delete cart[id];
        else cart[id] = qty;
        saveCart(); renderCart();
      }
      function removeFromCart(id) { delete cart[id]; saveCart(); renderCart(); }
      function clearCart() { cart = {}; saveCart(); renderCart(); }

      // Event listeners
      productsGrid.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const id = btn.dataset.id;
        if (btn.dataset.action === 'add') addToCart(id, 1);
        if (btn.dataset.action === 'view') openModal(id);
      });

      cartItemsEl.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const id = btn.dataset.id;
        if (btn.dataset.action === 'inc') setCartQty(id, (cart[id] || 0) + 1);
        if (btn.dataset.action === 'dec') setCartQty(id, (cart[id] || 0) - 1);
        if (btn.dataset.action === 'rem') removeFromCart(id);
      });

      cartToggle.addEventListener('click', () => { cartSidebar.classList.add('open'); cartSidebar.setAttribute('aria-hidden', 'false'); });
      closeCart.addEventListener('click', () => { cartSidebar.classList.remove('open'); cartSidebar.setAttribute('aria-hidden', 'true'); });
      clearCartBtn.addEventListener('click', clearCart);
      checkoutBtn.addEventListener('click', () => {
        if (Object.keys(cart).length === 0) { alert('Cart empty'); return; }
        alert('Demo checkout — thank you!');
      });

      // Modal
      function openModal(id) {
        const p = getProduct(id);
        if (!p) return;
        modalTitle.textContent = p.title;
        modalImage.src = p.img;
        modalPrice.textContent = formatPrice(p.price);
        modalDescription.textContent = p.desc;
        modalFeatures.innerHTML = p.features.map(f => `<span class="earrings-feature">${f}</span>`).join('');
        modalQty.value = 1;
        modalAddBtn.dataset.id = id;
        modalBackdrop.classList.add('show');
      }
      closeModal.addEventListener('click', () => modalBackdrop.classList.remove('show'));
      modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) modalBackdrop.classList.remove('show'); });
      modalAddBtn.addEventListener('click', () => {
        const id = modalAddBtn.dataset.id;
        const qty = Math.max(1, parseInt(modalQty.value,10) || 1);
        addToCart(id, qty);
        modalBackdrop.classList.remove('show');
      });

      // Search / filter with debounce
      function debounce(fn, wait) { let t; return function() { clearTimeout(t); t = setTimeout(() => fn.apply(this, arguments), wait); }; }
      [searchInput, categorySelect, sortSelect].forEach(el => {
        el.addEventListener('input', debounce(renderProducts, 150));
        el.addEventListener('change', renderProducts);
      });

      // Scroll progress + navbar
      window.addEventListener('scroll', () => {
        const doc = document.documentElement;
        const height = doc.scrollHeight - doc.clientHeight;
        const pct = height ? (window.scrollY / height) * 100 : 0;
        document.getElementById('progressBar').style.width = pct + '%';
        const nav = document.getElementById('navbar');
        if (window.scrollY > 30) nav.classList.add('scrolled'); else nav.classList.remove('scrolled');
      }, { passive: true });

      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { modalBackdrop.classList.remove('show'); cartSidebar.classList.remove('open'); } });

      // initial render
      renderProducts();
      renderCart();

      // sanitize cart
      (function sanitize() {
        let changed = false;
        Object.keys(cart).forEach(id => { if (!getProduct(id)) { delete cart[id]; changed = true; } });
        if (changed) saveCart();
      })();
    })();
  </script>
</body>
</html>
