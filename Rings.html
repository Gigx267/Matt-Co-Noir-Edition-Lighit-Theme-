<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Icebyflexy — Rings Collection (mobile optimised)</title>
    <!-- viewport: proper scaling, touch-friendly -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes"/>
    <meta name="description" content="Premium luxury rings collection – engagement, wedding, diamond. Fully responsive mobile shopping."/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
    <style>
        /* RESET & BASE – clean light mode, mobile-first */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.45;
            overflow-x: hidden;
        }
        a { color: inherit; text-decoration: none; }
        img { display: block; max-width: 100%; height: auto; }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* progress bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(212,175,55,0.15);
            z-index: 1100;
        }
        .progress-bar-line {
            height: 100%;
            width: 0;
            background: #d4af37;
            transition: width 0.1s linear;
        }

        /* Navbar – taller, tap‑friendly */
        .transparent-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 0;
            z-index: 1050;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.03);
            transition: all 0.2s;
        }
        .navbar-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .site-logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.3rem;
            color: #1a1a1a;
            display: flex;
            align-items: center;
        }
        .site-logo img {
            height: 1cm;           
            max-height: 42px;
            width: auto;
            border-radius: 50%;
        }
        .nav-links {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #444;
            padding: 0.4rem 0;      
            white-space: nowrap;
        }
        .nav-link.active, .nav-link:hover { color: #d4af37; }

        /* Hero – smaller on mobile, still elegant */
        .hero {
            min-height: 36vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5.2rem 1rem 2rem;
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), 
                        url('./kp\ \(17\).jpeg') center/cover no-repeat;
            margin-bottom: 0.5rem;
        }
        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 8vw, 3.8rem);
            color: #1a1a1a;
        }
        .hero p {
            color: #444;
            font-size: 1rem;
            max-width: 600px;
            margin: 0.5rem auto 0;
        }

        /* Controls – stacked, touch optimised */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            margin: 2rem 0 1.8rem;
        }
        .search {
            flex: 2 1 200px;
            min-width: 160px;
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 0.2rem 0.7rem;
            border-radius: 48px;
            border: 1px solid #eee;
        }
        .search:focus-within {
            border-color: #d4af37;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
        }
        .search input {
            background: transparent;
            border: 0;
            outline: none;
            color: #1a1a1a;
            padding: 0.7rem 0.4rem;
            font-size: 0.95rem;
            width: 100%;
        }
        .search input::placeholder { color: #aaa; }

        .select {
            background: #f9f9f9;
            padding: 0.7rem 1rem;
            border-radius: 48px;
            border: 1px solid #eee;
            color: #444;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1 1 auto;
            min-width: 140px;
        }
        .badge {
            background: #d4af37;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 48px;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* GRID – mobile: 2 columns, tablet: 3, desktop: 4 */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);   /* 2 on smallest */
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        @media (min-width: 600px) {
            .grid { gap: 1.2rem; }
        }
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 1024px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* CARD – clean, touch friendly, no overflowing specs */
        .card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 18px;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.05);
            border-color: #d4af37;
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;          /* square images */
            object-fit: cover;
            background: #f5f5f5;
        }
        .card-body {
            padding: 0.9rem 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
        }
        .product-title {
            font-weight: 700;
            color: #1a1a1a;
            font-size: 0.9rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.4rem;
        }
        .product-meta {
            color: #777;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        /* hide spec list on mobile grid (kept in modal) */
        .ring-specs {
            display: none;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.4rem;
        }
        .price {
            font-weight: 700;
            color: #1a1a1a;
            font-size: 1rem;
        }
        .btn {
            background: transparent;
            border: 1.5px solid #d4af37;
            color: #d4af37;
            padding: 0.45rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
            white-space: nowrap;
            min-width: 60px;
            text-align: center;
        }
        .btn.primary {
            background: #d4af37;
            color: white;
            border-color: transparent;
        }
        .btn.primary:hover {
            background: #b8952e;
        }
        .btn.ghost {
            border-color: transparent;
            color: #777;
        }

        /* Cart toggle – large bottom button */
        .cart-toggle {
            position: fixed;
            right: 1.2rem;
            bottom: 1.8rem;
            background: #1a1a1a;
            color: white;
            padding: 0.9rem 1.4rem;
            border-radius: 60px;
            z-index: 1200;
            cursor: pointer;
            border: none;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            font-size: 1rem;
        }

        /* Cart sidebar – full width on mobile, max-width on larger */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: #fff;
            box-shadow: -10px 0 30px rgba(0,0,0,0.06);
            padding: 1.5rem 1.2rem;
            transition: right 0.3s ease;
            z-index: 1190;
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.open { right: 0; }
        .cart-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.3rem;
        }
        .cart-item {
            display: flex;
            gap: 0.8rem;
            padding: 1rem 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .cart-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            background: #f5f5f5;
        }
        .muted { color: #777; font-size: 0.85rem; }

        /* Modal – full size for ring details, size selector etc. */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1250;
        }
        .modal-backdrop.show { display: flex; }
        .modal {
            background: #fff;
            border-radius: 28px;
            padding: 1.5rem;
            width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #eee;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        .modal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        @media (min-width: 640px) {
            .modal-grid { grid-template-columns: 1fr 1fr; }
        }
        .modal img {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 20px;
            background: #f8f8f8;
        }
        .ring-specs-modal {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0 0.8rem;
        }
        .ring-specs-modal div {
            background: #f0f0f0;
            color: #555;
            padding: 0.25rem 0.7rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        /* size selector in modal */
        #modalSizeSelect {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 0.7rem;
            border-radius: 48px;
            font-size: 1rem;
        }
        #modalQty {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 0.7rem;
            border-radius: 48px;
            width: 80px;
            font-size: 1rem;
        }

        /* empty state */
        .empty { padding: 2rem; text-align: center; color: #888; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-bar-line" id="progressBar"></div></div>

    <header class="transparent-navbar" id="navbar">
        <div class="container">
            <div class="navbar-wrapper">
                <a class="site-logo" href="index.html"><img src="logo.png" alt="Icebyflexy Logo" loading="lazy"></a>
                <nav class="nav-links">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="About.html">About</a>
                    <a class="nav-link" href="shop.html">Collection</a>
                    <a class="nav-link" href="contact.html">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="hero" aria-label="rings hero">
            <div>
                <h1>Rings that define moments</h1>
                <p>Discover engagement, wedding & statement rings.</p>
            </div>
        </section>

        <section class="container" aria-label="ring shop">
            <div class="controls">
                <div class="search" role="search">
                    <span class="material-icons" style="opacity:0.7;">search</span>
                    <input id="searchInput" placeholder="Search e.g. 'diamond', 'gold'" aria-label="Search rings"/>
                </div>

                <select id="categorySelect" class="select" aria-label="Filter by category">
                    <option value="all">All categories</option>
                    <option value="engagement">Engagement</option>
                    <option value="wedding">Wedding Bands</option>
                    <option value="diamond">Diamond</option>
                    <option value="gold">Gold</option>
                    <option value="silver">Silver</option>
                    <option value="statement">Statement</option>
                    <option value="men">Men's</option>
                    <option value="limited">Limited</option>
                </select>

                <select id="sizeSelect" class="select" aria-label="Filter by ring size">
                    <option value="all">All sizes</option>
                    <option value="5">Size 5</option>
                    <option value="6">Size 6</option>
                    <option value="7">Size 7</option>
                    <option value="8">Size 8</option>
                    <option value="9">Size 9</option>
                    <option value="10">Size 10</option>
                    <option value="11">Size 11</option>
                </select>

                <select id="sortSelect" class="select" aria-label="Sort rings">
                    <option value="featured">Featured</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="newest">Newest</option>
                </select>

                <div class="badge" id="resultsCount">0</div>
            </div>

            <div id="productsGrid" class="grid" aria-live="polite"></div>
            <div id="emptyState" class="empty" style="display:none">No rings found — try another filter.</div>
        </section>
    </main>

    <button id="cartToggle" class="cart-toggle" aria-label="Open cart">
        <span class="material-icons-outlined">shopping_cart</span>
        <span id="cartCount">0</span>
    </button>

    <aside id="cartSidebar" class="cart-sidebar" aria-hidden="true">
        <div class="cart-head">
            <h3 style="font-size:1.3rem;">Your Cart</h3>
            <button id="closeCart" class="btn ghost" style="border:none;">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div style="padding-top:1rem; border-top:1px solid #f0f0f0;">
            <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
                <span class="muted">Subtotal</span>
                <span id="cartSubtotal" style="font-weight:700; color:#d4af37;">$0.00</span>
            </div>
            <button id="checkoutBtn" class="btn primary" style="width:100%; padding:0.9rem;">Checkout</button>
            <button id="clearCartBtn" class="btn" style="width:100%; margin-top:0.5rem;">Clear Cart</button>
        </div>
    </aside>

    <!-- Modal -->
    <div id="modalBackdrop" class="modal-backdrop">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                <h2 id="modalTitle" style="font-size:1.4rem;">Ring</h2>
                <button id="closeModal" class="btn ghost" style="border:none;">✕</button>
            </div>
            <div class="modal-grid">
                <img id="modalImage" src="" alt="">
                <div>
                    <div id="modalPrice" style="font-weight:800; color:#d4af37; font-size:1.6rem; margin-bottom:0.5rem;"></div>
                    <p id="modalDescription" class="muted" style="margin-bottom:1rem;"></p>
                    <div id="modalSpecs" class="ring-specs-modal"></div>

                    <div style="margin:1.5rem 0 0.8rem;">
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Ring Size</label>
                        <select id="modalSizeSelect" style="width:100%;"></select>
                    </div>

                    <div style="display:flex; gap:0.8rem; align-items:center; margin-bottom:1.2rem;">
                        <label style="font-weight:600;">Qty</label>
                        <input id="modalQty" type="number" min="1" value="1" style="width:80px;">
                    </div>

                    <button id="modalAddBtn" class="btn primary" style="width:100%; padding:0.9rem;">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ----- RINGS DATA (unchanged) -----
            const products = [
                { id: 'r001', title:'Eternal Diamond', price:5200, category:'engagement', size: [6,7,8,9], img:'kp (8).jpeg', desc:'Solitaire diamond engagement ring with 1.5-carat brilliant cut center stone. Platinum setting.', specs: ['1.5 Carat Diamond', 'Platinum Setting', 'Brilliant Cut', 'Four-Prong'] },
                { id: 'r002', title:'Classic Wedding Band', price:950, category:'wedding', size: [5,6,7,8,9,10,11], img:'kp (9).jpeg', desc:'Timeless 18K gold wedding band. Comfort-fit design for everyday wear.', specs: ['18K Gold', 'Comfort-Fit', '4mm Width', 'Polished Finish'] },
                { id: 'r003', title:'Rose Gold Halo', price:3800, category:'engagement', size: [5,6,7,8], img:'kp (10).jpeg', desc:'Rose gold engagement ring with halo setting. 1-carat center diamond surrounded by micropavé diamonds.', specs: ['Rose Gold', 'Halo Setting', '1 Carat Center', 'Micropavé Diamonds'] },
                { id: 'r004', title:'Men\'s Tungsten', price:450, category:'men', size: [8,9,10,11,12], img:'kp (11).jpeg', desc:'Durable tungsten carbide ring with brushed finish. Scratch-resistant and hypoallergenic.', specs: ['Tungsten Carbide', 'Scratch-Resistant', 'Brushed Finish', 'Men\'s Size'] },
                { id: 'r005', title:'Three-Stone Promise', price:2750, category:'diamond', size: [5,6,7,8,9], img:'kp (12).jpeg', desc:'Three-stone diamond ring symbolizing past, present, and future. Platinum setting.', specs: ['Three Diamonds', 'Platinum', 'Total 1.8 Carats', 'Prong Setting'] },
                { id: 'r006', title:'Celestial Statement', price:1250, category:'statement', size: [6,7,8,9], img:'kp (13).jpeg', desc:'Statement ring with celestial design featuring moon and star motifs. Sterling silver.', specs: ['Sterling Silver', 'Celestial Design', 'Statement Piece', 'Oxidized Details'] },
                { id: 'r007', title:'Infinity Love Band', price:680, category:'wedding', size: [5,6,7,8,9], img:'kp (14).jpeg', desc:'White gold band with infinity symbol and diamond accents. Perfect for anniversary.', specs: ['White Gold', 'Infinity Symbol', 'Diamond Accents', '2mm Width'] },
                { id: 'r008', title:'Artisan Silver', price:320, category:'silver', size: [6,7,8,9,10], img:'kp (1).jpeg', desc:'Handcrafted sterling silver ring with organic texture. Unique artisan design.', specs: ['Handcrafted', 'Sterling Silver', 'Organic Texture', 'Artisan Design'] },
                { id: 'r009', title:'Royal Sapphire', price:4200, category:'limited', size: [6,7,8], img:'kp (25).jpeg', desc:'Limited edition sapphire and diamond ring. 2-carat Ceylon sapphire with diamond halo.', specs: ['Limited Edition', 'Ceylon Sapphire', 'Diamond Halo', 'Yellow Gold'] },
            ];

            // ----- CART: each item key = id_size -----
            let cart = JSON.parse(localStorage.getItem('iceby_cart_rings') || '{}');

            // DOM elements
            const grid = document.getElementById('productsGrid');
            const resultsCount = document.getElementById('resultsCount');
            const emptyState = document.getElementById('emptyState');
            const searchInput = document.getElementById('searchInput');
            const categorySelect = document.getElementById('categorySelect');
            const sizeSelect = document.getElementById('sizeSelect');
            const sortSelect = document.getElementById('sortSelect');
            const cartToggle = document.getElementById('cartToggle');
            const cartSidebar = document.getElementById('cartSidebar');
            const cartItemsEl = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartSubtotal = document.getElementById('cartSubtotal');
            const closeCart = document.getElementById('closeCart');
            const clearCartBtn = document.getElementById('clearCartBtn');
            const checkoutBtn = document.getElementById('checkoutBtn');
            const modalBackdrop = document.getElementById('modalBackdrop');
            const modalTitle = document.getElementById('modalTitle');
            const modalImage = document.getElementById('modalImage');
            const modalPrice = document.getElementById('modalPrice');
            const modalDescription = document.getElementById('modalDescription');
            const modalSpecs = document.getElementById('modalSpecs');
            const modalSizeSelect = document.getElementById('modalSizeSelect');
            const modalQty = document.getElementById('modalQty');
            const modalAddBtn = document.getElementById('modalAddBtn');
            const closeModal = document.getElementById('closeModal');

            let currentProductId = null;

            function formatPrice(n) { return '$' + n.toFixed(2); }
            function getProduct(id) { return products.find(p => p.id === id); }

            // render grid
            function renderProducts() {
                const q = searchInput.value.toLowerCase().trim();
                const cat = categorySelect.value;
                const size = sizeSelect.value;
                const sort = sortSelect.value;

                let list = products.slice();

                if (cat !== 'all') list = list.filter(p => p.category === cat);
                if (size !== 'all') list = list.filter(p => p.size.includes(parseInt(size, 10)));
                if (q) list = list.filter(p => (p.title + ' ' + p.desc + ' ' + p.category).toLowerCase().includes(q));

                if (sort === 'price-asc') list.sort((a,b)=>a.price - b.price);
                else if (sort === 'price-desc') list.sort((a,b)=>b.price - a.price);
                else if (sort === 'newest') list.reverse();

                grid.innerHTML = '';
                if (!list.length) {
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    list.forEach(p => {
                        const card = document.createElement('article');
                        card.className = 'card';
                        card.setAttribute('data-id', p.id);
                        card.innerHTML = `
                            <img class="card-img" src="${p.img}" alt="${p.title}" loading="lazy">
                            <div class="card-body">
                                <div class="product-title">${p.title}</div>
                                <div class="product-meta">${p.category}</div>
                                <div class="price-row">
                                    <span class="price">${formatPrice(p.price)}</span>
                                    <button class="btn primary add-btn" data-id="${p.id}">Add</button>
                                </div>
                            </div>
                        `;
                        // click card -> open modal, but ignore if "Add" clicked
                        card.addEventListener('click', (e) => {
                            if (!e.target.classList.contains('add-btn')) openModal(p.id);
                        });
                        grid.appendChild(card);
                    });
                }
                resultsCount.textContent = list.length;
            }

            // modal
            function openModal(id) {
                const p = getProduct(id);
                if (!p) return;
                currentProductId = id;
                modalTitle.textContent = p.title;
                modalImage.src = p.img;
                modalPrice.textContent = formatPrice(p.price);
                modalDescription.textContent = p.desc;
                modalSpecs.innerHTML = p.specs.map(s => `<div>${s}</div>`).join('');
                // populate size dropdown
                modalSizeSelect.innerHTML = p.size.map(sz => `<option value="${sz}">Size ${sz}</option>`).join('');
                modalQty.value = 1;
                modalBackdrop.classList.add('show');
            }

            function closeModalFunc() { modalBackdrop.classList.remove('show'); }

            // cart functions
            function saveCart() { localStorage.setItem('iceby_cart_rings', JSON.stringify(cart)); }
            function addToCart(id, qty, size) {
                const key = `${id}_${size}`;
                if (!cart[key]) cart[key] = { qty: 0, size: size };
                cart[key].qty += qty;
                saveCart();
                renderCart();
            }
            function removeFromCart(key) { delete cart[key]; saveCart(); renderCart(); }
            function setCartQty(key, qty) {
                if (qty <= 0) delete cart[key];
                else { cart[key].qty = qty; saveCart(); renderCart(); }
            }
            function clearCart() { cart = {}; saveCart(); renderCart(); }

            function renderCart() {
                cartItemsEl.innerHTML = '';
                const keys = Object.keys(cart);
                let subtotal = 0;
                let totalQty = 0;
                if (!keys.length) {
                    cartItemsEl.innerHTML = '<div class="muted">Your cart is empty.</div>';
                } else {
                    keys.forEach(key => {
                        const [id, size] = key.split('_');
                        const p = getProduct(id);
                        const item = cart[key];
                        if (!p || !item) return;
                        subtotal += p.price * item.qty;
                        totalQty += item.qty;
                        const div = document.createElement('div');
                        div.className = 'cart-item';
                        div.innerHTML = `
                            <img src="${p.img}" alt="${p.title}">
                            <div style="flex:1;">
                                <div style="font-weight:600;">${p.title}</div>
                                <div class="muted">Size: ${item.size} | ${formatPrice(p.price)} × ${item.qty}</div>
                                <div style="margin-top:0.4rem; display:flex; gap:0.5rem;">
                                    <button class="btn" data-key="${key}" data-act="dec">−</button>
                                    <button class="btn" data-key="${key}" data-act="inc">+</button>
                                    <button class="btn" data-key="${key}" data-act="rem">Remove</button>
                                </div>
                            </div>
                        `;
                        cartItemsEl.appendChild(div);
                    });
                }
                cartCount.textContent = totalQty;
                cartSubtotal.textContent = formatPrice(subtotal);
            }

            // Event listeners
            grid.addEventListener('click', (e) => {
                const addBtn = e.target.closest('.add-btn');
                if (addBtn) {
                    e.stopPropagation();
                    const id = addBtn.dataset.id;
                    addToCart(id, 1, '6');   // default size 6 from quick add
                }
            });

            cartItemsEl.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const key = btn.dataset.key;
                const act = btn.dataset.act;
                if (!key || !act) return;
                if (act === 'inc') setCartQty(key, (cart[key]?.qty || 0) + 1);
                if (act === 'dec') setCartQty(key, (cart[key]?.qty || 0) - 1);
                if (act === 'rem') removeFromCart(key);
            });

            cartToggle.addEventListener('click', () => { cartSidebar.classList.add('open'); });
            closeCart.addEventListener('click', () => { cartSidebar.classList.remove('open'); });
            clearCartBtn.addEventListener('click', clearCart);
            checkoutBtn.addEventListener('click', () => {
                if (Object.keys(cart).length === 0) { alert('Cart empty'); return; }
                alert('Demo checkout — thank you.');
            });

            // modal add
            modalAddBtn.addEventListener('click', () => {
                if (!currentProductId) return;
                const qty = Math.max(1, parseInt(modalQty.value, 10) || 1);
                const size = modalSizeSelect.value;
                addToCart(currentProductId, qty, size);
                closeModalFunc();
            });
            closeModal.addEventListener('click', closeModalFunc);
            modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModalFunc(); });

            // filter events
            [searchInput, categorySelect, sizeSelect, sortSelect].forEach(el => {
                el.addEventListener('input', () => renderProducts());
                el.addEventListener('change', () => renderProducts());
            });

            // scroll progress
            window.addEventListener('scroll', () => {
                const doc = document.documentElement;
                const height = doc.scrollHeight - doc.clientHeight;
                const pct = height ? (window.scrollY / height) * 100 : 0;
                document.getElementById('progressBar').style.width = pct + '%';
                const nav = document.getElementById('navbar');
                if (window.scrollY > 40) nav.classList.add('scrolled');
                else nav.classList.remove('scrolled');
            }, { passive: true });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { modalBackdrop.classList.remove('show'); cartSidebar.classList.remove('open'); }
            });

            // sanitise cart
            (function sanitize() {
                let changed = false;
                Object.keys(cart).forEach(key => {
                    const [id] = key.split('_');
                    if (!getProduct(id)) { delete cart[key]; changed = true; }
                });
                if (changed) saveCart();
            })();

            // initial
            renderProducts();
            renderCart();
        })();
    </script>
</body>
</html>
